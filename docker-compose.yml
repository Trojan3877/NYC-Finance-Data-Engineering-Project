version: '3.8'

# Copy .env.example to .env and set real credentials before running.
# Never commit a populated .env file.

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-nyc_finance}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  etl:
    build: .
    container_name: nyc_finance_etl
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://finance_user:finance_pass@postgres:5432/nyc_finance}
      - RAW_DATA_DIR=${RAW_DATA_DIR:-/app/data/raw}
      - PROCESSED_DATA_DIR=${PROCESSED_DATA_DIR:-/app/data/processed}
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: bash run_etl.sh

volumes:
  pgdata:
